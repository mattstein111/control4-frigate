name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .c4z drivers
        run: ./build.sh all

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: drivers
          path: dist/*.c4z
